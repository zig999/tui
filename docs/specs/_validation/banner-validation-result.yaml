  - id: WARN-001
    type: cross-ref
    source: docs/specs/front/components/banner.component.spec.md §8
    description: >
      The BDD scenario "Notched frame" in component spec §8 states "the outer
      <section>'s aria-labelledby resolves to that <h1>'s id" — implying the
      <section> is labeled by Banner's inner visible <h1> (the titleId generated
      by useId()). However, back spec §4.3 and BR-06 establish that the inner
      <h*> is aria-hidden="true" unconditionally in the notched branch, and that
      the <section>'s aria-labelledby is owned by Panel and points to Panel's
      notched heading — NOT to Banner's inner heading. The titleId is explicitly
      documented as "not used for labelling in this spec" (reserved for future
      use). The component spec's BDD scenario is therefore stale relative to the
      back spec's a11y resolution. Implementation will be correct following the
      back spec; the component spec §8 notched scenario and §9 a11y contract
      should be updated to reflect the resolved decision. Responsible: Back Spec
      Agent (owns the resolution) to align the component spec, or Spec Writer to
      update the stale BDD.

