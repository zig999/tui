$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/be-to-fe-handoff.schema.yaml"
title: be-to-fe-handoff
description: >
  Schema for handoff-be-to-fe.md YAML gate block (machine-readable header).
  Generated by u-fullstack-orchestrator after Phase 1 (Backend) completes.
  Consumed by u-fe-orchestrator-core to verify BE completion state before starting Phase 2.
  The gate block must appear first in the file, inside a yaml code fence, before the Markdown body.
type: object
required:
  - session
  - layer
  - generated_by
  - generated_at
  - be_phase_status
  - endpoints
  - api_contract_status
  - known_deviations_count
additionalProperties: false
properties:

  session:
    type: string
    description: "Session identifier matching {SESSION} variable."

  layer:
    type: string
    const: "semi-permanent"

  generated_by:
    type: string
    const: "u-fullstack-orchestrator"

  generated_at:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    description: "ISO-8601: YYYY-MM-DDTHH:MM:SSZ"

  be_phase_status:
    type: string
    enum: [complete, complete_with_deviations]
    description: "complete = all BE TCs Done, no deviations. complete_with_deviations = done but spec-divergences.md has entries."

  endpoints:
    type: array
    minItems: 1
    items:
      type: object
      required: [task_contract, endpoint, methods, status]
      additionalProperties: false
      properties:
        task_contract:
          type: string
          pattern: "^TC-[0-9]+$"
        endpoint:
          type: string
          description: "Route path, e.g. /api/users/:id"
        methods:
          type: array
          items:
            type: string
            enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
          minItems: 1
        status:
          type: string
          enum: [done, done_with_deviations]

  api_contract_status:
    type: string
    enum: [up_to_date, has_deviations]
    description: "Whether openapi.yaml in SPECS_DIR reflects the implemented state."

  known_deviations_count:
    type: integer
    minimum: 0
    description: "Number of entries in spec-divergences.md from BE task contracts."

  database_changes:
    type: array
    items:
      type: string
    description: "List of migration/table/column changes. Empty array if none."

  fe_notes:
    type: array
    items:
      type: string
    description: "BE-side constraints the FE team must be aware of (auth requirements, rate limits, etc.)."
