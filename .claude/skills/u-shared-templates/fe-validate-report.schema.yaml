$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/fe-validate-report.schema.yaml"
title: fe-validate-report
description: >
  Machine-readable YAML schema for standalone frontend validation output.
  Generated by /u-fe-validate command.
  No Task Contract required — targets any file or glob pattern.
  Consumed by: human review, CI gates, or orchestrator-dev when used as pre-TC gate.
type: object
required:
  - meta
  - status
  - verdict
  - summary
  - findings
additionalProperties: false

properties:
  meta:
    type: object
    required: [run_id, target, validated_by, timestamp, rules_applied, specs_dir_used]
    additionalProperties: false
    properties:
      run_id:
        type: string
        pattern: "^FV-[0-9]{8}-[0-9]{6}$"
        description: "Format: FV-YYYYMMDD-HHMMSS"
      target:
        type: string
        description: "Path or glob pattern passed to the command"
      files_scanned:
        type: integer
        minimum: 0
      validated_by:
        type: string
        const: "u-fe-validate"
      timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      rules_applied:
        type: array
        minItems: 1
        items:
          type: string
          enum: [code_quality, visual_design]
      specs_dir_used:
        type: [string, "null"]
        description: "Path to design-system/ used for token validation. null if not provided."

  status:
    type: string
    enum: [passed, failed]

  verdict:
    type: string
    enum: [approved, approved_with_caveats, rejected]
    description: >
      approved: zero findings.
      approved_with_caveats: only medium/low findings present.
      rejected: at least one critical or high finding present.

  summary:
    type: object
    required: [total, critical, high, medium, low]
    additionalProperties: false
    properties:
      total:
        type: integer
        minimum: 0
      critical:
        type: integer
        minimum: 0
      high:
        type: integer
        minimum: 0
      medium:
        type: integer
        minimum: 0
      low:
        type: integer
        minimum: 0

  findings:
    type: array
    items:
      type: object
      required: [id, rule_set, rule, file, severity, description, suggested_fix]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^FINDING-[0-9]{3}$"
        rule_set:
          type: string
          enum: [code_quality, visual_design]
        rule:
          type: string
          description: "Slug from u-fe-standards. Examples: inline-css, design-token, line-height, gradient-text"
        file:
          type: string
        line:
          type: [integer, "null"]
          minimum: 1
        severity:
          type: string
          enum: [critical, high, medium, low]
        description:
          type: string
          description: "Single objective sentence describing the violation found"
        suggested_fix:
          type: string
          description: "Concrete action to resolve the violation"
