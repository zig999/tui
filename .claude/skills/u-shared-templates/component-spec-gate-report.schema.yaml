$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/component-spec-gate-report.schema.yaml"
title: component-spec-gate-report
description: >
  Output schema for the Planner component spec gate (Step 4B of the FE planning pipeline).
  Emitted by u-fe-planner when it detects component spec gaps that require resolution
  before or during development. Consumed by u-fe-orchestrator-core to decide whether to
  halt (P0 gap) or proceed with warnings (P1/P2 gaps).
type: object
required:
  - gate
  - p0_gaps
  - p1_p2_gaps
  - spec_task_contracts_generated
  - proceed
additionalProperties: false
properties:

  gate:
    type: object
    required: [id, reported_by, epic, timestamp, layer]
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: "^CSG-[0-9]{8}-[0-9]{6}$"
        description: "Format: CSG-YYYYMMDD-HHMMSS"
      reported_by:
        type: string
        const: "u-fe-planner"
      epic:
        type: string
        pattern: "^EPIC-[0-9]+$"
      timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      layer:
        type: string
        const: "semi-permanent"

  p0_gaps:
    type: array
    description: "P0 gaps block feature development entirely until resolved."
    items:
      type: object
      required: [component, reason, affected_task_contracts]
      additionalProperties: false
      properties:
        component:
          type: string
          description: "Component name missing a spec."
        reason:
          type: string
          description: "Why this gap is P0 — e.g. shared across 3+ screens, no props contract exists."
        affected_task_contracts:
          type: array
          items:
            type: string
            pattern: "^TC-[0-9]+$"
          minItems: 1

  p1_p2_gaps:
    type: array
    description: "P1/P2 gaps are logged as Warning in the backlog. Development continues with the instruction to flag at delivery."
    items:
      type: object
      required: [component, priority, reason, affected_task_contracts]
      additionalProperties: false
      properties:
        component:
          type: string
        priority:
          type: string
          enum: [P1, P2]
        reason:
          type: string
        affected_task_contracts:
          type: array
          items:
            type: string
            pattern: "^TC-[0-9]+$"
          minItems: 1

  spec_task_contracts_generated:
    type: array
    description: "Spec Task Contracts (type: spec) generated by the Planner to resolve P0 gaps. These block the feature TCs that depend on them."
    items:
      type: object
      required: [id, component, blocks_task_contracts]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^TC-[0-9]+$"
        component:
          type: string
        blocks_task_contracts:
          type: array
          items:
            type: string
            pattern: "^TC-[0-9]+$"
          minItems: 1

  proceed:
    type: boolean
    description: "false when p0_gaps is non-empty — orchestrator must halt and await human decision."
