$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/ui-agent-output.schema.yaml"
title: ui-agent-output
description: >
  Schema for the YAML gate block embedded at the top of ui-epic-XX.md.
  Generated by u-fe-ui agent. Consumed by u-fe-orchestrator-core (UI spec completeness gate)
  and u-fe-developer (screen extraction per Task Contract).
  The gate block must appear first in the file, inside a yaml code fence, before the Markdown body.
type: object
required:
  - epic
  - layer
  - produced_by
  - timestamp
  - tasks_covered
  - ui_nn_covered
  - bdd_scenarios_covered
  - design_system
  - open_questions_count
  - ready_for_development
additionalProperties: false
properties:

  epic:
    type: string
    pattern: "^EPIC-[0-9]+$"
    description: "Parent epic identifier. Format: EPIC-NN."

  layer:
    type: string
    const: "semi-permanent"

  produced_by:
    type: string
    const: "u-fe-ui"

  timestamp:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    description: "ISO-8601: YYYY-MM-DDTHH:MM:SSZ"

  tasks_covered:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, screens, status]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^TC-[0-9]+$"
        screens:
          type: array
          items:
            type: string
          minItems: 1
          description: "Screen names covered by this Task Contract."
        status:
          type: string
          enum: [complete, partial]

  ui_nn_covered:
    type: array
    items:
      type: object
      required: [feature, source, states, all_states_covered]
      additionalProperties: false
      properties:
        feature:
          type: string
        source:
          type: string
          description: "Relative path to the feature spec."
        states:
          type: array
          items:
            type: string
            pattern: "^UI-[0-9]+$"
          minItems: 1
        all_states_covered:
          type: boolean

  bdd_scenarios_covered:
    type: array
    items:
      type: object
      required: [scenario_id, screen, states, coverage]
      additionalProperties: false
      properties:
        scenario_id:
          type: string
          pattern: "^S-[0-9]+$"
        screen:
          type: string
        states:
          type: array
          items:
            type: string
            pattern: "^UI-[0-9]+$"
        coverage:
          type: string
          enum: [full, partial, missing]

  design_system:
    type: object
    required: [source, rules_applied]
    additionalProperties: false
    properties:
      source:
        type: string
        description: "Relative path to the design system directory."
      rules_applied:
        type: boolean

  open_questions_count:
    type: integer
    minimum: 0

  ready_for_development:
    type: boolean
    description: "false when any task has status=partial or open_questions_count > 0 with blocking items."

  partial_release_notes:
    type: string
    description: "Populated when ready_for_development=false. Explains what is missing and which Task Contracts are blocked."
