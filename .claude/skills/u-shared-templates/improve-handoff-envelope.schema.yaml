$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/improve-handoff-envelope.schema.yaml"
title: improve-handoff-envelope
description: >
  Machine-readable envelope produced by u-improve and consumed by u-spec-orchestrator.
  Carries the change scope, mode hint, execution policy (lean vs full pipeline and
  regression-test discipline), and a return contract that closes the loop without
  requiring human re-confirmation. Mirrored into
  {SESSIONS_DIR}/{improve_session}/log-orchestrator-dev.md as YAML block.
  Note: "improve" here means any intentional change (bug fix, tweak, or enhancement);
  no dedicated bug envelope exists — all change types flow through this envelope.
type: object
required:
  - handoff_envelope
additionalProperties: false
properties:
  handoff_envelope:
    type: object
    required:
      - id
      - source
      - invocation_source
      - improve_session
      - improvement_task
      - mode_hint
      - affected_specs
      - estimated_task_contracts
      - execution_policy
      - return_contract
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: "^IMPROVE-[0-9]{8}-[0-9]{6}$"
        description: "Format: IMPROVE-YYYYMMDD-HHMMSS"
      source:
        type: string
        const: "u-improve"
      invocation_source:
        type: string
        enum: [u-improve, spec-triage, human]
      improve_session:
        type: string
        minLength: 1
      improvement_task:
        type: string
        minLength: 1
      mode_hint:
        type: string
        enum: ["fast-track:minor", "fast-track:patch", "full"]
      affected_specs:
        type: array
        minItems: 0
        items:
          type: object
          required: [path, sections, change_summary]
          additionalProperties: false
          properties:
            path:
              type: string
              minLength: 1
            sections:
              type: array
              minItems: 1
              items:
                type: string
            change_summary:
              type: string
              minLength: 1
      estimated_task_contracts:
        type: integer
        minimum: 1
      execution_policy:
        type: object
        description: >
          Derived by u-improve Step 2.6 from the description text and affected_specs.
          Drives the Dev pipeline: lean skips Planner and TDD; full runs the standard
          Planner → Developer → QA cycle with regression_test_required enforcing a
          failing test before the fix.
        required: [pipeline, regression_test_required, planner_required]
        additionalProperties: false
        properties:
          pipeline:
            type: string
            enum: [lean, full]
          regression_test_required:
            type: boolean
          planner_required:
            type: boolean
      return_contract:
        type: object
        required: [emit_event, update_field, expected_terminal_states]
        additionalProperties: false
        properties:
          emit_event:
            type: string
            const: "spec_pipeline_return"
            description: >
              Event type emitted to log.jsonl by u-spec-orchestrator when the spec
              pipeline reaches a terminal state. Replaces legacy write_to field.
          update_field:
            type: string
            const: "spec_change_status"
          expected_terminal_states:
            type: array
            minItems: 1
            items:
              type: string
              enum: [completed, failed]
