# handoff-manifest — canonical template
# Produced by: generate_handoff_manifest.py (run by orchestrator-sdd in SDD Step 6)
# Consumed by: orchestrator-dev / orchestrator-review / orchestrator-test (via parse_manifest_fields)
# Note: handoff.delivered_by stays the const "u-spec-orchestrator" — it is the FLOW-030 protocol id, not an agent.
# Schema: .claude/skills/u-shared-templates/handoff-manifest.schema.yaml
# Layer: semi-permanent — stored at {SPECS_DIR}/handoff-manifest.yaml
# Rules:
#   - Generate immediately after Validator returns VALID and before cleanup
#   - compliance_report must point to the path generated by the Validator
#   - frontend_artifacts is omitted entirely for backend-only handoffs
#   - delivered_at is the authoritative timestamp for version pinning in log-orchestrator-dev.md
#   - sha256 on every backend_package and frontend_package entry is computed at generation time
#     and verified by the Dev orchestrator via u-handoff-validator (rules HDF-020 / HDF-021)

handoff:
  id: HANDOFF-<YYYYMMDD-HHMMSS>
  delivered_by: u-spec-orchestrator
  delivered_at: <YYYY-MM-DDTHH:MM:SSZ>
  layer: semi-permanent
  type: new_domain | major_evolution | fast_track | reverse_eng

domains:
  - name: <domain-name>
    spec_version: <version>
    back_version: <version>
    openapi_version: <version>
    compliance_report: <path>

frontend_artifacts:
  front_md_version: <version>
  features:
    - name: <feature-name>
      path: <relative-path>
  flows:
    - name: <flow-name>
      path: <relative-path>

backend_package:
  - path: <relative-path>
    artifact: conventions | error-codes | openapi | spec | back-spec
    sha256: <64-char hex sha256 of file at generation time>

frontend_package:
  - path: <relative-path>
    artifact: conventions | error-codes | openapi | spec | front | feature-spec | component-spec | flow
    sha256: <64-char hex sha256 of file at generation time>

change_summary:
  type: patch | minor | major
  cr: <CR-NN or "none">
  changed_files:
    - <relative-path>
  dev_impact: no_action | reevaluate_task_contracts | stop_domain_task_contracts
