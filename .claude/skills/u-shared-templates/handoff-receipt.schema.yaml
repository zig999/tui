$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/handoff-receipt.schema.yaml"
title: handoff-receipt
description: >
  Machine-readable acknowledgment emitted by a Dev orchestrator after
  consuming a handoff-manifest.yaml. Closes the Spec -> Dev loop: the Spec
  orchestrator can audit whether a previous handoff was consumed before
  issuing a new one. One receipt per (manifest_id, orchestrator) pair.
type: object
required:
  - receipt
  - decisions
  - validation
additionalProperties: false
properties:
  receipt:
    type: object
    required:
      - manifest_id
      - manifest_sha256
      - consumed_by
      - consumed_at
      - session_id
      - layer
    additionalProperties: false
    properties:
      manifest_id:
        type: string
        pattern: "^HANDOFF-[0-9]{8}-[0-9]{6}$"
      manifest_sha256:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: "sha256 of the full handoff-manifest.yaml file at consumption time"
      consumed_by:
        type: string
        enum:
          - u-be-orchestrator-core
          - u-fe-orchestrator-core
      consumed_at:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      session_id:
        type: string
      layer:
        type: string
        const: "semi-permanent"
  decisions:
    type: object
    required:
      - domains_halted
      - task_contracts_reevaluated
      - task_contracts_proceeded
    additionalProperties: false
    properties:
      domains_halted:
        type: array
        items:
          type: string
      task_contracts_reevaluated:
        type: array
        items:
          type: string
          pattern: "^TC-[0-9]+"
      task_contracts_proceeded:
        type: array
        items:
          type: string
          pattern: "^TC-[0-9]+"
  validation:
    type: object
    required:
      - manifest_schema_valid
      - sha256_integrity_valid
    additionalProperties: false
    properties:
      manifest_schema_valid:
        type: boolean
      sha256_integrity_valid:
        type: boolean
      validator_envelope_timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
if:
  properties:
    validation:
      properties:
        manifest_schema_valid:
          const: false
      required: [manifest_schema_valid]
  required: [validation]
then:
  description: "A receipt is only emitted for a successfully validated manifest"
  properties:
    decisions:
      properties:
        domains_halted:
          maxItems: 0
        task_contracts_reevaluated:
          maxItems: 0
        task_contracts_proceeded:
          maxItems: 0
