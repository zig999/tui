$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/handoff-manifest.schema.yaml"
title: handoff-manifest
description: >
  Machine-readable YAML manifest of a spec-to-dev handoff.
  Generated by generate_handoff_manifest.py (run by orchestrator-sdd) at delivery time.
  Consumed by the Dev/Review/Test orchestrators (via parse_manifest_fields) to detect
  available specs and pinned versions without parsing narrative logs.
type: object
required:
  - handoff
  - domains
  - backend_package
additionalProperties: false
properties:
  handoff:
    type: object
    required: [id, delivered_by, delivered_at, layer, type]
    additionalProperties: false
    properties:
      id:
        type: string
        pattern: "^HANDOFF-[0-9]{8}-[0-9]{6}$"
        description: "Format: HANDOFF-YYYYMMDD-HHMMSS"
      delivered_by:
        type: string
        const: "u-spec-orchestrator"
      delivered_at:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      layer:
        type: string
        const: "semi-permanent"
      type:
        type: string
        enum: [new_domain, major_evolution, fast_track, reverse_eng]
  domains:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, spec_version, back_version, openapi_version, compliance_report]
      additionalProperties: false
      properties:
        name:
          type: string
        spec_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        back_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        openapi_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        compliance_report:
          type: string
  frontend_artifacts:
    type: object
    description: "Omit entirely for backend-only handoffs"
    required: [front_md_version, features, flows]
    additionalProperties: false
    properties:
      front_md_version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      features:
        type: array
        items:
          type: object
          required: [name, path]
          additionalProperties: false
          properties:
            name:
              type: string
            path:
              type: string
      flows:
        type: array
        items:
          type: object
          required: [name, path]
          additionalProperties: false
          properties:
            name:
              type: string
            path:
              type: string
  backend_package:
    type: array
    minItems: 1
    items:
      type: object
      required: [path, artifact, sha256]
      additionalProperties: false
      properties:
        path:
          type: string
        artifact:
          type: string
          enum: [conventions, error-codes, openapi, spec, back-spec]
        sha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: "sha256 hash of file contents at generation time — Dev orchestrator verifies before consumption"
  frontend_package:
    type: array
    items:
      type: object
      required: [path, artifact, sha256]
      additionalProperties: false
      properties:
        path:
          type: string
        artifact:
          type: string
          enum: [conventions, error-codes, openapi, spec, front, feature-spec, component-spec, flow]
        sha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: "sha256 hash of file contents at generation time — Dev orchestrator verifies before consumption"
  change_summary:
    type: object
    description: "Populated only for evolution/fast-track handoffs"
    required: [type, cr, changed_files, dev_impact]
    additionalProperties: false
    properties:
      type:
        type: string
        enum: [patch, minor, major]
      cr:
        type: string
        description: "CR-NN or none"
      changed_files:
        type: array
        items:
          type: string
      dev_impact:
        type: string
        enum: [no_action, reevaluate_task_contracts, stop_domain_task_contracts]
