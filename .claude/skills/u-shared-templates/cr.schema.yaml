$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/cr.schema.yaml"
title: cr
description: >
  Change Request canonical schema.
  Produced by: Developer (spec_gap | infeasibility) | QA (error) | Orchestrator (any)
  Consumed by: Orchestrator-Dev (triage) → Spec Team (resolution) → backlog update
type: object
required:
  - id
  - reported_by
  - timestamp
  - task
  - epic
  - artifact
  - type
  - description
  - evidence
  - proposed_change
  - impact
  - resolution
additionalProperties: false
properties:
  id:
    type: string
    pattern: "^CR-[0-9]+$"
    description: "Sequential, project-scoped: CR-01, CR-02, ..."
  reported_by:
    type: string
    enum:
      - u-fe-developer
      - u-be-developer
      - u-fe-qa
      - u-be-qa
      - u-fe-orchestrator-core
      - u-be-orchestrator-core
  timestamp:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    description: "ISO-8601: YYYY-MM-DDTHH:MM:SSZ"
  task:
    type: ["string", "null"]
    description: "Task Contract where the issue was discovered; null for Epic-level CRs"
  epic:
    type: string
    pattern: "^EPIC-[0-9]+$"
  artifact:
    type: object
    required: [path, section, version]
    additionalProperties: false
    properties:
      path:
        type: string
        description: "File path of the spec artifact with the issue"
      section:
        type: string
        description: "e.g. §3 Business Rules | paths: POST /users | TC-XX AC-02"
      version:
        type: string
        description: "Spec version at time of discovery (from delivery-gate spec_consumed)"
  type:
    type: string
    enum: [spec_gap, spec_error, infeasibility, design_conflict]
    description: >
      spec_gap: required detail not present — Developer had to infer.
      spec_error: spec contains incorrect, contradictory, or ambiguous information.
      infeasibility: spec requirement cannot be implemented as written.
      design_conflict: spec contradicts CLAUDE.md, design system, or another approved spec.
  description:
    type: string
    description: "One sentence: what is missing, wrong, or infeasible"
  evidence:
    type: array
    minItems: 1
    items:
      type: string
  proposed_change:
    type: string
    description: "One sentence: what the spec should say instead. N/A for spec_gap discovery only."
  impact:
    type: object
    required: [dev_blocked, task_contracts_affected, scope]
    additionalProperties: false
    properties:
      dev_blocked:
        type: boolean
      task_contracts_affected:
        type: array
        items:
          type: string
      scope:
        type: string
        enum: [low, medium, high]
        description: "low: isolated fix; medium: 1-2 endpoints or BRs; high: contract or cross-domain"
  resolution:
    type: object
    required: [status, decided_by, decision, spec_updated, delivery_updated, timestamp]
    additionalProperties: false
    properties:
      status:
        type: string
        enum: [open, accepted, rejected, deferred]
      decided_by:
        type: string
        description: "Agent or human who resolved"
      decision:
        type: string
        description: "What was decided"
      spec_updated:
        type: boolean
      delivery_updated:
        type: boolean
      timestamp:
        type: string
        pattern: "^([0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z|)$"
        description: "ISO-8601 when resolved; empty string when status=open"
