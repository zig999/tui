$schema: "http://json-schema.org/draft-07/schema#"
$id: "u-shared-templates/validation-result.schema.yaml"
title: validation-result
description: >
  Machine-readable YAML schema for spec validation output.
  Generated by u-spec-validator alongside the Markdown report.
  Consumed by u-spec-orchestrator to make handoff decisions without parsing free-form text.
type: object
required:
  - validation
  - status
  - blocking_count
  - warning_count
  - handoff_allowed
  - blocking_issues
  - warnings
additionalProperties: false
properties:
  validation:
    type: object
    required: [domain, artifact_version, mode, validated_by, timestamp, layer]
    additionalProperties: false
    properties:
      domain:
        type: string
      artifact_version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      mode:
        type: string
        enum: [incremental_back, final_front, final_complete]
      validated_by:
        type: string
        const: "u-spec-validator"
      timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      layer:
        type: string
        const: "permanent"
  status:
    type: string
    enum: [VALID, INVALID]
  blocking_count:
    type: integer
    minimum: 0
  warning_count:
    type: integer
    minimum: 0
  handoff_allowed:
    type: boolean
    description: "handoff_allowed = (status=VALID and blocking_count=0 and mode!=incremental_back). incremental_back always false (front leg still pending); in a final mode (final_complete/final_front) it follows the verdict — a back-only flow's terminal final_complete hands off on VALID+0 with no human edit (fix F2)."
  blocking_issues:
    type: array
    items:
      type: object
      required: [id, type, source, description, responsible, suggested_fix]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^ISSUE-[0-9]{3}$"
        type:
          type: string
          enum: [cross-ref, error-code, orphan-spec, dependency, schema, missing-file]
        source:
          type: string
        description:
          type: string
        responsible:
          type: string
          enum: [u-spec-back, u-spec-front, u-spec-writer]
        suggested_fix:
          type: string
  warnings:
    type: array
    items:
      type: object
      required: [id, type, source, description]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^WARN-[0-9]{3}$"
        type:
          type: string
          enum: [cross-ref, coverage, design-system, bdd, transform, component-gap]
        source:
          type: string
        description:
          type: string
if:
  properties:
    validation:
      properties:
        mode:
          const: incremental_back
      required: [mode]
  required: [validation]
then:
  properties:
    handoff_allowed:
      const: false
